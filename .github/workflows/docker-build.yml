name: docker-build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: Docker Image Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api-business/Dockerfile
          push: false
          tags: rag-platform-api-business:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build API Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api-web/Dockerfile
          push: false
          tags: rag-platform-api-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build orchestrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/orchestrator/Dockerfile
          push: false
          tags: rag-platform-orchestrator:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: false
          tags: rag-platform-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
