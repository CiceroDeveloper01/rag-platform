name: pr-validation

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend PR Validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ragdb
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U rag -d ragdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_NAME: rag-platform-api
      NODE_ENV: test
      PORT: 3001
      APP_VERSION: 0.0.1
      FRONTEND_ORIGINS: http://localhost:3000
      DATABASE_ENABLED: "true"
      DB_HOST: localhost
      DB_PORT: 5433
      DB_USERNAME: rag
      DB_PASSWORD: rag
      DB_NAME: ragdb
      DB_SCHEMA: public
      DB_SSL: "false"
      DB_SYNCHRONIZE: "false"
      DB_LOGGING: "false"
      OPENAI_API_KEY: ci-test-key
      LLM_TIMEOUT_MS: 30000
      METRICS_PREFIX: rag_platform_api_
      METRICS_DEFAULTS_ENABLED: "true"
      OTEL_ENABLED: "false"
      LOG_LEVEL: error
      LOG_PRETTY: "false"
      LOG_REDACT_ENABLED: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/api/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install API dependencies
        run: npm ci
        working-directory: apps/api

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run database migrations
        env:
          PGPASSWORD: rag
        run: |
          for file in database/migrations/*.sql; do
            psql -h localhost -p 5433 -U rag -d ragdb -f "$file"
          done

      - name: Lint API
        run: npm run lint
        working-directory: apps/api

      - name: Run API unit tests
        run: npm run test -- --runInBand
        working-directory: apps/api

      - name: Run API integration tests
        run: npm run test:e2e -- --runInBand
        working-directory: apps/api

      - name: Generate API coverage
        run: npm run test:cov:ci
        working-directory: apps/api

      - name: Build API
        run: npm run build
        working-directory: apps/api

      - name: Run orchestrator tests
        run: npm run test -- --runInBand
        working-directory: apps/orchestrator

      - name: Generate orchestrator coverage
        run: npm run test:cov:ci
        working-directory: apps/orchestrator

      - name: Build orchestrator
        run: npm run build
        working-directory: apps/orchestrator

  frontend:
    name: Frontend PR Validation
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
      NEXT_PUBLIC_GRAFANA_URL: http://localhost:3002
      NEXT_PUBLIC_PROMETHEUS_URL: http://localhost:9090
      NEXT_PUBLIC_APP_ENV: ci
      NEXT_PUBLIC_CHAT_STREAMING: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm ci
        working-directory: apps/web

      - name: Lint web
        run: npm run lint
        working-directory: apps/web

      - name: Run web tests
        run: npm run test
        working-directory: apps/web

      - name: Generate web coverage
        run: npm run test:coverage
        working-directory: apps/web

      - name: Build web
        run: npm run build
        working-directory: apps/web
