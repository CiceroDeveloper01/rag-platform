services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rag-network

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rag-network

  api:
    build:
      context: .
      dockerfile: apps/api-business/Dockerfile
    container_name: rag-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    environment:
      APP_NAME: rag-platform-api
      NODE_ENV: production
      PORT: 3000
      APP_VERSION: 0.0.1
      FRONTEND_ORIGINS: http://localhost:3002
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_TTL_DEFAULT: ${REDIS_TTL_DEFAULT:-30}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH:-storage/documents}
      MAX_DOCUMENT_SIZE_MB: ${MAX_DOCUMENT_SIZE_MB:-10}
      ALLOWED_DOCUMENT_TYPES: ${ALLOWED_DOCUMENT_TYPES:-pdf,txt,md,docx}
      AUTH_SESSION_TTL_HOURS: 8
      AUTH_SESSION_COOKIE_NAME: rag_platform_session
      AUTH_SECURE_COOKIES: "false"
      AUTH_RATE_LIMIT_TTL_MS: 60000
      AUTH_RATE_LIMIT_LIMIT: 120
      DEMO_USER_EMAIL: demo@ragplatform.dev
      DEMO_USER_PASSWORD: demo123
      DEMO_USER_NAME: Demo Operator
      DATABASE_ENABLED: "true"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: rag
      DB_PASSWORD: rag
      DB_NAME: ragdb
      DB_SCHEMA: public
      DB_SSL: "false"
      DB_SYNCHRONIZE: "false"
      DB_LOGGING: "false"
      MEMORY_RETENTION_DAYS: ${MEMORY_RETENTION_DAYS:-30}
      MEMORY_MAX_MESSAGE_CHARS: ${MEMORY_MAX_MESSAGE_CHARS:-4000}
      MEMORY_MAX_MESSAGES_PER_CONVERSATION: ${MEMORY_MAX_MESSAGES_PER_CONVERSATION:-200}
      MEMORY_RECENT_LIMIT: ${MEMORY_RECENT_LIMIT:-8}
      MEMORY_SEMANTIC_LIMIT: ${MEMORY_SEMANTIC_LIMIT:-5}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      OPENAI_LLM_MODEL: gpt-4o-mini
      LLM_TIMEOUT_MS: 30000
      OMNICHANNEL_EMAIL_ENABLED: "true"
      OMNICHANNEL_API_RUNTIME_ENABLED: "false"
      OMNICHANNEL_EMAIL_PROVIDER: ${OMNICHANNEL_EMAIL_PROVIDER:-dev}
      OMNICHANNEL_EMAIL_FROM: ${OMNICHANNEL_EMAIL_FROM:-no-reply@rag-platform.local}
      OMNICHANNEL_EMAIL_DEV_MODE: "true"
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mock}
      EMAIL_IMAP_HOST: ${EMAIL_IMAP_HOST:-imap.gmail.com}
      EMAIL_IMAP_PORT: ${EMAIL_IMAP_PORT:-993}
      EMAIL_IMAP_SECURE: ${EMAIL_IMAP_SECURE:-true}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-smtp.gmail.com}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-465}
      EMAIL_SMTP_SECURE: ${EMAIL_SMTP_SECURE:-true}
      EMAIL_USERNAME: ${EMAIL_USERNAME:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_POLL_INTERVAL_SECONDS: ${EMAIL_POLL_INTERVAL_SECONDS:-30}
      EMAIL_INBOX: ${EMAIL_INBOX:-INBOX}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-no-reply@rag-platform.local}
      EMAIL_MAX_ATTACHMENT_MB: ${EMAIL_MAX_ATTACHMENT_MB:-10}
      METRICS_PREFIX: rag_platform_api_
      METRICS_DEFAULTS_ENABLED: "true"
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: rag-platform-api
      OTEL_SERVICE_VERSION: 0.0.1
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=docker-local
      LOG_LEVEL: info
      LOG_PRETTY: "false"
      LOG_REDACT_ENABLED: "true"
    ports:
      - "3000:3000"
    volumes:
      - api_storage_data:/app/storage
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/v1/health/ready').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - rag-network

  orchestrator:
    build:
      context: .
      dockerfile: apps/orchestrator/Dockerfile
    container_name: rag-orchestrator
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      APP_NAME: rag-platform-orchestrator
      NODE_ENV: production
      PORT: 3001
      APP_VERSION: 0.0.1
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      INBOUND_QUEUE_NAME: ${INBOUND_QUEUE_NAME:-inbound-messages}
      INBOUND_QUEUE_CONCURRENCY: ${INBOUND_QUEUE_CONCURRENCY:-5}
      INBOUND_QUEUE_ATTEMPTS: ${INBOUND_QUEUE_ATTEMPTS:-3}
      INBOUND_QUEUE_BACKOFF_MS: ${INBOUND_QUEUE_BACKOFF_MS:-1000}
      FLOW_EXECUTION_QUEUE_NAME: ${FLOW_EXECUTION_QUEUE_NAME:-flow-execution}
      FLOW_EXECUTION_QUEUE_CONCURRENCY: ${FLOW_EXECUTION_QUEUE_CONCURRENCY:-5}
      FLOW_EXECUTION_QUEUE_ATTEMPTS: ${FLOW_EXECUTION_QUEUE_ATTEMPTS:-3}
      FLOW_EXECUTION_QUEUE_BACKOFF_MS: ${FLOW_EXECUTION_QUEUE_BACKOFF_MS:-1000}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://api:3000}
      INTERNAL_API_REQUEST_TIMEOUT_MS: ${INTERNAL_API_REQUEST_TIMEOUT_MS:-10000}
      HTTP_RETRY_ENABLED: ${HTTP_RETRY_ENABLED:-true}
      HTTP_RETRY_MAX_ATTEMPTS: ${HTTP_RETRY_MAX_ATTEMPTS:-3}
      HTTP_RETRY_INITIAL_DELAY_MS: ${HTTP_RETRY_INITIAL_DELAY_MS:-250}
      HTTP_RETRY_MAX_DELAY_MS: ${HTTP_RETRY_MAX_DELAY_MS:-2000}
      HTTP_CIRCUIT_BREAKER_ENABLED: ${HTTP_CIRCUIT_BREAKER_ENABLED:-true}
      HTTP_CIRCUIT_BREAKER_FAILURE_THRESHOLD: ${HTTP_CIRCUIT_BREAKER_FAILURE_THRESHOLD:-5}
      HTTP_CIRCUIT_BREAKER_OPEN_MS: ${HTTP_CIRCUIT_BREAKER_OPEN_MS:-30000}
      INBOUND_QUEUE_DLQ_NAME: ${INBOUND_QUEUE_DLQ_NAME:-inbound-messages-dlq}
      FLOW_EXECUTION_QUEUE_DLQ_NAME: ${FLOW_EXECUTION_QUEUE_DLQ_NAME:-flow-execution-dlq}
      INBOUND_QUEUE_COMPLETED_RETENTION_SECONDS: ${INBOUND_QUEUE_COMPLETED_RETENTION_SECONDS:-86400}
      INBOUND_QUEUE_FAILED_RETENTION_SECONDS: ${INBOUND_QUEUE_FAILED_RETENTION_SECONDS:-604800}
      FLOW_EXECUTION_QUEUE_COMPLETED_RETENTION_SECONDS: ${FLOW_EXECUTION_QUEUE_COMPLETED_RETENTION_SECONDS:-86400}
      FLOW_EXECUTION_QUEUE_FAILED_RETENTION_SECONDS: ${FLOW_EXECUTION_QUEUE_FAILED_RETENTION_SECONDS:-604800}
      INTERNAL_API_DOCUMENTS_REGISTER_PATH: ${INTERNAL_API_DOCUMENTS_REGISTER_PATH:-/documents/register}
      INTERNAL_API_CONVERSATIONS_REPLY_PATH: ${INTERNAL_API_CONVERSATIONS_REPLY_PATH:-/conversations/reply}
      INTERNAL_API_HANDOFF_PATH: ${INTERNAL_API_HANDOFF_PATH:-/handoff}
      INTERNAL_API_SEARCH_PATH: ${INTERNAL_API_SEARCH_PATH:-/search}
      INTERNAL_API_MEMORY_STORE_PATH: ${INTERNAL_API_MEMORY_STORE_PATH:-/memory/messages}
      INTERNAL_API_MEMORY_CONTEXT_PATH: ${INTERNAL_API_MEMORY_CONTEXT_PATH:-/memory/context}
      RAG_RETRIEVAL_TOP_K: ${RAG_RETRIEVAL_TOP_K:-5}
      EMAIL_LISTENER_ENABLED: ${EMAIL_LISTENER_ENABLED:-true}
      EMAIL_LISTENER_MODE: ${EMAIL_LISTENER_MODE:-manual}
      EMAIL_LISTENER_POLL_INTERVAL_MS: ${EMAIL_LISTENER_POLL_INTERVAL_MS:-30000}
      EMAIL_LISTENER_API_BASE_URL: ${EMAIL_LISTENER_API_BASE_URL:-}
      EMAIL_LISTENER_API_TOKEN: ${EMAIL_LISTENER_API_TOKEN:-}
      EMAIL_LISTENER_OUTBOUND_PATH: ${EMAIL_LISTENER_OUTBOUND_PATH:-/messages/send}
      EMAIL_LISTENER_TIMEOUT_MS: ${EMAIL_LISTENER_TIMEOUT_MS:-10000}
      EMAIL_LISTENER_RETRY_ENABLED: ${EMAIL_LISTENER_RETRY_ENABLED:-true}
      EMAIL_LISTENER_RETRY_MAX_ATTEMPTS: ${EMAIL_LISTENER_RETRY_MAX_ATTEMPTS:-3}
      EMAIL_LISTENER_RETRY_INITIAL_DELAY_MS: ${EMAIL_LISTENER_RETRY_INITIAL_DELAY_MS:-250}
      EMAIL_LISTENER_RETRY_MAX_DELAY_MS: ${EMAIL_LISTENER_RETRY_MAX_DELAY_MS:-2000}
      TELEGRAM_LISTENER_ENABLED: ${TELEGRAM_LISTENER_ENABLED:-true}
      TELEGRAM_LISTENER_BOT_TOKEN: ${TELEGRAM_LISTENER_BOT_TOKEN:-}
      TELEGRAM_LISTENER_MODE: ${TELEGRAM_LISTENER_MODE:-polling}
      TELEGRAM_LISTENER_POLLING_INTERVAL_MS: ${TELEGRAM_LISTENER_POLLING_INTERVAL_MS:-10000}
      TELEGRAM_LISTENER_WEBHOOK_SECRET: ${TELEGRAM_LISTENER_WEBHOOK_SECRET:-}
      TELEGRAM_LISTENER_API_BASE_URL: ${TELEGRAM_LISTENER_API_BASE_URL:-https://api.telegram.org}
      TELEGRAM_LISTENER_TIMEOUT_MS: ${TELEGRAM_LISTENER_TIMEOUT_MS:-10000}
      TELEGRAM_LISTENER_RETRY_ENABLED: ${TELEGRAM_LISTENER_RETRY_ENABLED:-true}
      TELEGRAM_LISTENER_RETRY_MAX_ATTEMPTS: ${TELEGRAM_LISTENER_RETRY_MAX_ATTEMPTS:-3}
      TELEGRAM_LISTENER_RETRY_INITIAL_DELAY_MS: ${TELEGRAM_LISTENER_RETRY_INITIAL_DELAY_MS:-250}
      TELEGRAM_LISTENER_RETRY_MAX_DELAY_MS: ${TELEGRAM_LISTENER_RETRY_MAX_DELAY_MS:-2000}
      WHATSAPP_LISTENER_ENABLED: ${WHATSAPP_LISTENER_ENABLED:-true}
      WHATSAPP_LISTENER_MODE: ${WHATSAPP_LISTENER_MODE:-manual}
      WHATSAPP_LISTENER_API_BASE_URL: ${WHATSAPP_LISTENER_API_BASE_URL:-}
      WHATSAPP_LISTENER_API_TOKEN: ${WHATSAPP_LISTENER_API_TOKEN:-}
      WHATSAPP_LISTENER_OUTBOUND_PATH: ${WHATSAPP_LISTENER_OUTBOUND_PATH:-/messages}
      WHATSAPP_LISTENER_TIMEOUT_MS: ${WHATSAPP_LISTENER_TIMEOUT_MS:-10000}
      WHATSAPP_LISTENER_RETRY_ENABLED: ${WHATSAPP_LISTENER_RETRY_ENABLED:-true}
      WHATSAPP_LISTENER_RETRY_MAX_ATTEMPTS: ${WHATSAPP_LISTENER_RETRY_MAX_ATTEMPTS:-3}
      WHATSAPP_LISTENER_RETRY_INITIAL_DELAY_MS: ${WHATSAPP_LISTENER_RETRY_INITIAL_DELAY_MS:-250}
      WHATSAPP_LISTENER_RETRY_MAX_DELAY_MS: ${WHATSAPP_LISTENER_RETRY_MAX_DELAY_MS:-2000}
    ports:
      - "3001:3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/ready').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - rag-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: rag-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_GRAFANA_URL: http://localhost:3005
      NEXT_PUBLIC_PROMETHEUS_URL: http://localhost:9090
      NEXT_PUBLIC_APP_ENV: docker
      NEXT_PUBLIC_CHAT_STREAMING: "true"
    ports:
      - "3002:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - rag-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    container_name: rag-otel
    restart: unless-stopped
    command: ["--config=/etc/otel/otel-collector.yaml"]
    volumes:
      - ./docker/otel/otel-collector.yaml:/etc/otel/otel-collector.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
      - "13133:13133"
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "--version"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - rag-network

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: rag-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      api:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:9090/-/healthy >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - rag-network

  grafana:
    image: grafana/grafana:11.3.1
    container_name: rag-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3005:3000"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1",
        ]
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - rag-network

  loki:
    image: grafana/loki:3.2.1
    container_name: rag-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./infra/observability/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3100/ready >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - rag-network

  promtail:
    image: grafana/promtail:3.2.1
    container_name: rag-promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./infra/observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:9080/ready >/dev/null 2>&1 || exit 1",
        ]
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - rag-network

  tempo:
    image: grafana/tempo:2.7.2
    container_name: rag-tempo
    restart: unless-stopped
    user: "0:0"
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./infra/observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200"
      - "4319:4317"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3200/ready >/dev/null 2>&1 || exit 1",
        ]
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - rag-network

volumes:
  postgres_data:
  redis_data:
  api_storage_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:

networks:
  rag-network:
    driver: bridge
