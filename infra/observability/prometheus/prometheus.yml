global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "rag-platform-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:3001"]
        labels:
          service: rag-platform-api

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: otel-collector

  - job_name: "loki"
    metrics_path: /metrics
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: loki

  - job_name: "promtail"
    metrics_path: /metrics
    static_configs:
      - targets: ["promtail:9080"]
        labels:
          service: promtail

  - job_name: "tempo"
    metrics_path: /metrics
    static_configs:
      - targets: ["tempo:3200"]
        labels:
          service: tempo

  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]
        labels:
          service: prometheus
