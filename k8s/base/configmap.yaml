apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-platform-config
data:
  NODE_ENV: "production"
  APP_VERSION: "1.0.0"
  FRONTEND_ORIGINS: "https://app.example.com"
  REDIS_ENABLED: "true"
  REDIS_HOST: "redis.platform.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_TTL_DEFAULT: "30"
  DATABASE_ENABLED: "true"
  DB_HOST: "postgres.platform.svc.cluster.local"
  DB_PORT: "5432"
  DB_USERNAME: "rag"
  DB_NAME: "ragdb"
  DB_SCHEMA: "public"
  DB_SSL: "false"
  DB_SYNCHRONIZE: "false"
  DB_LOGGING: "false"
  STORAGE_PROVIDER: "local"
  LOCAL_STORAGE_PATH: "storage/documents"
  MAX_DOCUMENT_SIZE_MB: "10"
  ALLOWED_DOCUMENT_TYPES: "pdf,txt,md,docx"
  RABBITMQ_HOST: "rabbitmq.platform.svc.cluster.local"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: "rag"
  RABBITMQ_VHOST: "/"
  RABBITMQ_QUEUE_DOCUMENT_INGESTION: "document.ingestion.requested"
  RABBITMQ_DOCUMENT_INGESTION_EXCHANGE: "documents.ingestion"
  RABBITMQ_DOCUMENT_INGESTION_ROUTING_KEY: "document.ingestion.requested"
  RABBITMQ_DOCUMENT_INGESTION_RETRY_EXCHANGE: "documents.ingestion.retry"
  RABBITMQ_DOCUMENT_INGESTION_RETRY_QUEUE: "document.ingestion.requested.retry"
  RABBITMQ_DOCUMENT_INGESTION_RETRY_ROUTING_KEY: "document.ingestion.requested.retry"
  RABBITMQ_DOCUMENT_INGESTION_RETRY_DELAY_MS: "30000"
  RABBITMQ_DOCUMENT_INGESTION_MAX_ATTEMPTS: "3"
  RABBITMQ_DOCUMENT_INGESTION_DLX: "documents.ingestion.dlx"
  RABBITMQ_DOCUMENT_INGESTION_DLQ: "document.ingestion.requested.dlq"
  RABBITMQ_DOCUMENT_INGESTION_DLQ_ROUTING_KEY: "document.ingestion.requested.dead"
  RABBITMQ_DOCUMENT_INGESTION_PREFETCH: "5"
  INTERNAL_API_BASE_URL: "http://rag-api-business:3000"
  INTERNAL_API_REQUEST_TIMEOUT_MS: "10000"
  INTERNAL_API_INGESTION_REQUEST_PATH: "/api/v1/internal/ingestion/request"
  INTERNAL_API_INGESTION_START_PATH: "/api/v1/internal/ingestion/start"
  INTERNAL_API_INGESTION_COMPLETE_PATH: "/api/v1/internal/ingestion/complete"
  INTERNAL_API_INGESTION_FAIL_PATH: "/api/v1/internal/ingestion/fail"
  INTERNAL_API_INGESTION_STATUS_PATH: "/api/v1/internal/ingestion/status"
  INTERNAL_API_DOCUMENTS_REGISTER_PATH: "/api/v1/internal/documents/register"
  INTERNAL_API_CONVERSATIONS_REPLY_PATH: "/api/v1/internal/conversations/reply"
  INTERNAL_API_HANDOFF_PATH: "/api/v1/internal/handoff"
  INTERNAL_API_SEARCH_PATH: "/api/v1/search"
  INTERNAL_API_MEMORY_STORE_PATH: "/api/v1/internal/memory/messages"
  INTERNAL_API_MEMORY_CONTEXT_PATH: "/api/v1/internal/memory/context"
  API_BUSINESS_BASE_URL: "http://rag-api-business:3000"
  API_BUSINESS_TIMEOUT_MS: "10000"
  NEXT_PUBLIC_API_BASE_URL: "https://api.example.com"
  NEXT_PUBLIC_GRAFANA_URL: "https://grafana.example.com"
  NEXT_PUBLIC_PROMETHEUS_URL: "https://prometheus.example.com"
  NEXT_PUBLIC_APP_ENV: "production"
  NEXT_PUBLIC_CHAT_STREAMING: "true"
  OTEL_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.platform.svc.cluster.local:4318"
  LOG_LEVEL: "info"
  LOG_PRETTY: "false"
  LOG_REDACT_ENABLED: "true"
