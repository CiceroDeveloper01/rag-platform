apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-orchestrator
  labels:
    app.kubernetes.io/name: rag-orchestrator
    app.kubernetes.io/part-of: rag-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: rag-orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-orchestrator
        app.kubernetes.io/part-of: rag-platform
    spec:
      containers:
        - name: orchestrator
          image: ghcr.io/your-org/rag-platform-orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: APP_NAME
              value: rag-platform-orchestrator
            - name: PORT
              value: "3001"
          envFrom:
            - configMapRef:
                name: rag-platform-config
            - secretRef:
                name: rag-platform-secrets
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            limits:
              cpu: "800m"
              memory: "1Gi"
