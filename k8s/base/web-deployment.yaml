apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-web
  labels:
    app.kubernetes.io/name: rag-web
    app.kubernetes.io/part-of: rag-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: rag-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-web
        app.kubernetes.io/part-of: rag-platform
    spec:
      containers:
        - name: web
          image: ghcr.io/your-org/rag-platform-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
          envFrom:
            - configMapRef:
                name: rag-platform-config
            - secretRef:
                name: rag-platform-secrets
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
