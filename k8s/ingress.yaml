apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-platform-ingress
spec:
  rules:
    - host: rag-platform.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rag-web
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: rag-api
                port:
                  number: 3001
    - host: grafana.rag-platform.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rag-grafana
                port:
                  number: 3000
    - host: prometheus.rag-platform.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rag-prometheus
                port:
                  number: 9090
