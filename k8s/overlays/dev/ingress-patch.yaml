apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-platform
spec:
  rules:
    - host: dev.app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rag-web
                port:
                  number: 80
    - host: dev.api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rag-api-web
                port:
                  number: 80
