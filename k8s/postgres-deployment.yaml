apiVersion: v1
kind: Secret
metadata:
  name: rag-postgres-secret
type: Opaque
stringData:
  POSTGRES_USER: rag
  POSTGRES_PASSWORD: rag
  POSTGRES_DB: ragdb
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rag-postgres-pvc
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-postgres
  template:
    metadata:
      labels:
        app: rag-postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: rag-postgres-secret
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgres-storage
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: rag-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: rag-postgres
spec:
  selector:
    app: rag-postgres
  ports:
    - port: 5432
      targetPort: 5432
