apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
    scrape_configs:
      - job_name: rag-platform-api
        static_configs:
          - targets: ["rag-api:3001"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-prometheus
  template:
    metadata:
      labels:
        app: rag-prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
      volumes:
        - name: prometheus-config
          configMap:
            name: rag-prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: rag-prometheus
spec:
  selector:
    app: rag-prometheus
  ports:
    - port: 9090
      targetPort: 9090
