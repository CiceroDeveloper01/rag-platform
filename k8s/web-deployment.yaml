apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-web-config
data:
  NEXT_PUBLIC_API_BASE_URL: https://rag-platform.local/api
  NEXT_PUBLIC_GRAFANA_URL: https://grafana.rag-platform.local
  NEXT_PUBLIC_PROMETHEUS_URL: https://prometheus.rag-platform.local
  NEXT_PUBLIC_APP_ENV: production
  NEXT_PUBLIC_CHAT_STREAMING: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-web
  template:
    metadata:
      labels:
        app: rag-web
    spec:
      containers:
        - name: web
          image: rag-platform-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: rag-web-config
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: rag-web
spec:
  selector:
    app: rag-web
  ports:
    - port: 3000
      targetPort: 3000
